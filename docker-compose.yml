# PortWise AI - Docker Compose
# Usage:
#   Local dev:   docker-compose up -d
#   Production:  docker-compose --profile production up -d

version: "3.8"

services:
  portwise-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portwise-ai
    ports:
      - "8501:8501"
    env_file:
      - .env          # Keep .env out of the image; mount it at runtime
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portwise-network

  redis:
    image: redis:7-alpine
    container_name: portwise-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - portwise-network

  # ── Production-only: Nginx reverse proxy ──────────────────────────────────
  # Enable with: docker-compose --profile production up -d
  # Before enabling:
  #   1. Create ./ssl/cert.pem and ./ssl/key.pem  (or use Let's Encrypt / certbot)
  #   2. Set your domain in nginx.conf server_name directive
  nginx:
    image: nginx:alpine
    container_name: portwise-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Only mount ssl/ if you have generated certificates.
      # Comment this line out if you don't have SSL certs yet.
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - portwise-ai
    restart: unless-stopped
    networks:
      - portwise-network
    profiles:
      - production   # Not started in default mode

volumes:
  redis-data:

networks:
  portwise-network:
    driver: bridge

# ── Security note ─────────────────────────────────────────────────────────────
# The GEMINI_API_KEY is loaded from .env via env_file, which is NOT baked into
# the image. However it is still visible via `docker inspect`.
# For hardened production deployments, use Docker Swarm secrets:
#   https://docs.docker.com/engine/swarm/secrets/
